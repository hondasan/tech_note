<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>移行中 - Knowledge Notebook</title>
  <script>
    if (window.location.hostname === 'hondasan.github.io') {
      const newBase = "https://tech-note.pages.dev";
      const newPath = window.location.pathname.replace(/^\/tech_note/, '');
      window.location.replace(newBase + newPath + window.location.search + window.location.hash);
    }
  </script>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      background-color: #f8f9fa;
      color: #333;
      text-align: center;
    }
    .container {
      max-width: 500px;
      padding: 2rem;
      background: white;
      border-radius: 8px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.05);
    }
    h1 {
      font-size: 1.5rem;
      margin-bottom: 1rem;
    }
    p {
      color: #666;
      margin-bottom: 1.5rem;
    }
    a {
      color: #0066cc;
      text-decoration: none;
    }
    a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>新しいサイトへ移動しています</h1>
    <p>Knowledge Notebookは新しいURLへ移行しました。自動的に転送されない場合は、以下のリンクをクリックしてください。</p>
    <a href="https://tech-note.pages.dev/">新しいサイトへ移動する</a>
  </div>
</body>
</html>
