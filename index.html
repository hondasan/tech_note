  <main>
    <div class="main-layout">
      <!-- サイドバー (左カラム) -->
      <aside class="sidebar" id="sidebar">
        <!-- スマホ用アコーディオンヘッダー -->
        <div class="sidebar-toggle-header" id="sidebarToggleHeader">
          <span class="sidebar-toggle-title">絞り込みフィルター</span>
          <button class="sidebar-toggle-btn" id="sidebarToggleBtn" aria-expanded="false" aria-label="フィルターを開く">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="6 9 12 15 18 9"></polyline>
            </svg>
          </button>
        </div>
        
        <!-- サイドバーコンテンツ（スマホでは折りたたみ対象） -->
        <div class="sidebar-content" id="sidebarContent">
          <div class="search-wrapper">
            <input type="text" id="searchInput" class="search-input" placeholder="記事を検索...">
            <div class="search-icon">
              <!-- Search SVG icon -->
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="11" cy="11" r="8"></circle>
                <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
              </svg>
            </div>
          </div>

          <div class="category-section">
            <h3 class="sidebar-section-title">カテゴリー</h3>
            <div class="filter-categories" id="filterCategories">
              <button class="filter-btn active" data-category="all">すべて</button>
            </div>
          </div>
        </div>
      </aside>

      <!-- メインコンテンツエリア (右カラム) -->
      <div class="content-area">
        <!-- ヒーローセクションをメインコンテンツの最上部に移動 -->
        <!-- ヒーローセクション -->
        <section class="hero">
          <h1 class="hero-title">AIと人で調査・整理した <span>知識ノート</span></h1>
          <p class="hero-description">
            技術・ビジネス・スポーツ・科学など<br>
            幅広い分野の情報を横断的に整理しています。
          </p>
          <div class="hero-meta">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="10"></circle>
              <line x1="12" y1="16" x2="12" y2="12"></line>
              <line x1="12" y1="8" x2="12.01" y2="8"></line>
            </svg>
            <span>記事はAIによる調査をベースに作成し、公開前に内容を確認・見直しています。</span>
          </div>
        </section>

        <!-- 表示モード切り替え＆統計情報ツールバー -->
        <div class="toolbar">
          <div class="toolbar-info" id="toolbarInfo">
            該当件数: <span id="totalNotesCount">0</span> 件
          </div>
          <div class="view-switchers">
            <button class="view-btn active" id="gridStyleBtn" title="グリッド表示" aria-label="グリッド表示">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="3" width="7" height="7"></rect>
                <rect x="14" y="3" width="7" height="7"></rect>
                <rect x="14" y="14" width="7" height="7"></rect>
                <rect x="3" y="14" width="7" height="7"></rect>
              </svg>
            </button>
            <button class="view-btn" id="listStyleBtn" title="リスト表示" aria-label="リスト表示">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="8" y1="6" x2="21" y2="6"></line>
                <line x1="8" y1="12" x2="21" y2="12"></line>
                <line x1="8" y1="18" x2="21" y2="18"></line>
                <line x1="3" y1="6" x2="3.01" y2="6"></line>
                <line x1="3" y1="12" x2="3.01" y2="12"></line>
                <line x1="3" y1="18" x2="3.01" y2="18"></line>
              </svg>
            </button>
          </div>
        </div>

        <section class="notes-grid" id="notesGrid">
          <div class="loading" style="grid-column: 1 / -1; text-align: center; color: var(--text-muted); padding: 3rem;">
            ノートを読み込んでいます...
          </div>
        </section>

        <div class="load-more-container" id="loadMoreContainer" style="display: none;">
          <button id="loadMoreBtn" class="load-more-btn">もっと見る</button>
